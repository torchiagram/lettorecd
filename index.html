<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Discman Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-overlay" id="darkOverlay"></div>
    <div class="glow-effect" id="glowEffect">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

    <div class="app-wrapper">
        <header><h1 class="main-title">Discman</h1></header>
        <main class="player-container">
            <div class="cd-reader" id="dropZone">
                <img src="img/lettorecdrender.png" class="reader-img" draggable="false">
                <div id="activeCdWrapper" class="active-cd-wrapper"></div>
            </div>
            <div class="status-text"><p id="trackTitle">Trascina un CD per iniziare</p></div>
            <div class="audio-controls">
                <button id="prevBtn" class="neu-btn btn-sm"><img src="img/prev.png" width="20"></button>
                <button id="playBtn" class="neu-btn btn-lg"><img src="img/play.png" id="playIcon" width="30"></button>
                <button id="nextBtn" class="neu-btn btn-sm"><img src="img/next.png" width="20"></button>
            </div>
        </main>
        <footer class="scroller-section">
            <div class="cd-scroller-mask">
                <div class="cd-scroller" id="cdScroller"></div>
            </div>
        </footer>
    </div>

    <div id="permPopup" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">💿</div>
            <h2 class="modal-title">Pronto a suonare?</h2>
            <button id="permBtn" class="modal-btn">SBLOCCA AUDIO</button>
        </div>
    </div>

    <audio id="silentAudio" preload="auto" src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>
    <iframe id="sc-widget" src="https://w.soundcloud.com/player/?url=https://api.soundcloud.com/tracks/297123165&auto_play=false" width="0" height="0" style="display:none" allow="autoplay"></iframe>
    
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script src="script.js"></script>
</body>
</html>

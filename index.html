<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Discman">
    <link rel="apple-touch-icon" href="img/icon-180.png">
    <title>Discman Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-overlay" id="darkOverlay"></div>
    <div class="glow-effect" id="glowEffect">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>
    <div class="app-wrapper">
        <header><h1 class="main-title">Discman</h1></header>
        <main class="player-container">
            <div class="cd-reader" id="dropZone">
                <img src="img/lettorecdrender.png" class="reader-img" draggable="false">
                <div id="activeCdWrapper" class="active-cd-wrapper"></div>
            </div>
            <div class="status-text"><p id="trackTitle">Scegli la Playlist</p></div>
            <div class="audio-controls">
                <button id="prevBtn" class="neu-btn btn-sm">
                    <img src="img/prev.png" width="20" alt="Indietro">
                </button>
                <button id="playBtn" class="neu-btn btn-lg">
                    <div id="playIconContainer">
                        <img src="img/play.png" id="playIcon" width="30">
                    </div>
                </button>
                <button id="nextBtn" class="neu-btn btn-sm">
                    <img src="img/next.png" width="20" alt="Avanti">
                </button>
            </div>
        </main>
        <footer class="scroller-section">
            <div class="cd-scroller-mask">
                <div class="cd-scroller" id="cdScroller"></div>
            </div>
        </footer>
    </div>
    <!--
        POPUP AUDIO — DEVE STARE NELL'HTML, NON CREATO DA JS.
        iOS sblocca l'audio solo se il tap avviene su un elemento
        che esisteva nel DOM al momento del caricamento della pagina.
    -->
    <div id="permPopup" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:999999; align-items:center; justify-content:center; background:rgba(0,0,0,0.75); touch-action:manipulation;">
        <div style="background:#dcdcdc; border-radius:24px; padding:32px 28px; max-width:280px; width:80%; text-align:center; box-shadow:12px 12px 24px #b8b8b8,-12px -12px 24px #ffffff; display:flex; flex-direction:column; gap:16px; align-items:center;">
            <div style="font-size:48px;">💿</div>
            <p style="margin:0; font-weight:700; font-size:15px; line-height:1.5; font-family:sans-serif;">Tocca per riprodurre musica</p>
            <button id="permBtn" type="button" style="border:none; outline:none; cursor:pointer; background:#dcdcdc; box-shadow:6px 6px 12px #b8b8b8,-6px -6px 12px #ffffff; border-radius:50px; padding:14px 32px; font-size:16px; font-weight:700; font-family:sans-serif; touch-action:manipulation; -webkit-appearance:none; min-width:180px; min-height:54px;">▶ Sì, riproduci</button>
        </div>
    </div>
    <!-- SoundCloud Widget nascosto -->
    <iframe id="sc-widget"
        src="https://w.soundcloud.com/player/?url=https://soundcloud.com/blink-182/dammit&auto_play=false"
        width="0" height="0" style="display:none" allow="autoplay">
    </iframe>
    <!-- Audio silenzioso per sblocco contesto audio iOS -->
    <audio id="silentAudio" src="data:audio/mp3;base64,//uQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==" preload="auto"></audio>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script src="script.js"></script>
</body>
</html>
